<!DOCTYPE html>
<html>
<head>
    <style>
        body,p { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #7979e3; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background-color: #f4f4f4; }
      button{
         width: 100%;
  min-height: 54px;
  border: none;
  border-radius: 999px;
  background:   #7979e3;
  color: #fffdf9;
  font: inherit;
  font-weight: 700;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-top:50px;
  cursor: pointer;
  box-shadow: 0 14px 28px rgba(216, 139, 116, 0.26);
  transition:
    transform 0.2s ease,
    box-shadow 0.2s ease,
    background 0.2s ease;
      }
      p{
        font-weight:bold;
      }
    </style>
</head>
<body>
     
    <div class="container">
         
        <div class="header">
            <img
            class="auth-logo"
            src="{{ url_for('static', filename='img/HotelAgency.png') }}"
            alt="Logo EasySport"
          /> 
         
          <p> HotelAgency
        </div>
       
        <div class="content">
            <p>  {{username}}  , recebeu um pedido de redefinição de palavra-passe. </p>
         <p>
          Se não efetuou este pedido, queira por favor desconsiderar esta mensagem.
          O link espirará dentro de 3 horas.
          </p>
          
          <a href="{{confirmation_link}}" target="_blank">
<button id="mybtn">{{confirmation_link}} Redefinir palavra-passe</button>
</a>

           <footer style="font-size:10px;margin-top:40px"> HotelAgency - estamos consigo. </footer>
        </div>
     
    </div>

</body>
</html>
